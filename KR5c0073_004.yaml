front:
  text: 道德真經注卷之四得六
  hash: sha256:6c63ce6b77e9704abd627c3060c6f2b19ec7b72bbc4764b2a9d4a65ebcc80954
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0073_HFL_004-001a, image: hfl/0373/0373-152.png}
body:
  text: 山陽王弼注治人事天莫若嗇莫若猶莫過也嗇農夫農人之治田務去其殊類歸於齊一也全其自然不急其荒病除其所以荒病上承天命下綏百姓莫過於此夫唯嗇是謂早服早服常也早服謂之重積德唯重積德不欲鋭速然後乃能使早服其常故曰早服謂之重積德者也重積德則無不克無不克則莫知其極道無窮也莫知其極可以有國以有窮而蒞國非能有國也有國之母可以長久國之所以安謂之母重積德是唯圖其根然後營末乃得其終也是謂深根固柢長生久視之道治大國若烹小鮮不擾也躁則多害靜則全真故其國彌大而其主彌靜然後乃能廣得衆心矣以道蒞天下其鬼不神治大國則若烹小鮮以道蒞天下則其鬼不神也非其鬼不神其神不傷人神不害自然也物守自然則神無所加神無所加則不知神之為神也非其神不傷人聖人亦不傷人道洽則神不傷人神不傷人則不知神之為神道洽則聖人亦不傷人聖人不傷人則亦不知聖人之為聖也猶云非獨不知神之為神亦不知聖人之為聖也夫恃威網以使物者治之衰也使不知神聖之為神聖道之極也夫兩不相傷故德交歸焉神不傷人聖人亦不傷人聖人不傷人神亦不傷人故曰兩不相傷也神聖合道交歸之也大國者下流江海居大而處下則百川流之大國居大而處下則天下流之故曰大國下流也天下之交天下所歸會也天下之牝靜而不求物自歸之也牝常以靜勝牡以靜為下以其靜故能為下也牝雌也雄躁動貪欲雌常以靜故能勝雄也以其靜復能為下故物歸之也故大國以下小國大國以下猶云以大國下小國則取小國小國則附之小國以下大國則取大國大國納之也故或下以取或下而取言唯修卑下然後乃各得其所大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲大者宜為下小國修下自全而已不能令天下歸之大國修下則天下歸之故曰各得其所欲則大者宜為下也道者萬物之奧奧猶曖也可得庇蔭之辭善人之寶寶以為用也不善人之所保保以全也美言可以市尊行可以加人言道無所不先物無有貴於此也雖有珍寶璧馬無以匹之美言之則可以奪衆貨之賈故曰美言可以市也尊行之則千里之外應之故曰可以加於人也人之不善何棄之有不善當保道以免放故立天子置三公言以尊行道也雖有拱璧以先駟馬不如坐進此道此道上之所云也言故立天子置三公尊其位重其人所以為道也物無有貴於此者故雖有拱抱寶璧以先駟馬而進之不如坐而進此道也古之所以貴比道者何不日以求得有罪以免耶故為天下貴以求則得求以免則得免無所而不施故為天下貴也為無為事無事味無味以無為為居以不言為教以恬淡為味治之極也大小多少報怨以德小怨則不足以報大怨則天下之所欲誅順天下之所同者德也圖難於其易為大於其細天下難事必作於易天下大事必作於細是以聖人終不為大故能成其大夫輕諾必寡信多易必多難是以聖人曰猶難之以聖人之才猶尚難於細易况非聖人之才而欲忽於此乎故曰猶難之也故終無難矣其安易持其未兆易謀以其安不忘危持之不忘亡謀之無功之勢故曰易也其脆易泮其微易散雖失無入有以其微脆之故未足以興大功故易也此四者皆説愼終也不可以無之故而不持不可以微之故而弗散也無而弗持則生有焉微而不散則生大焉故慮終之患如始之禍則無敗事為之於未有謂其安未兆也治之於未亂謂微脆也合抱之木生於毫末九層之臺起於纍土千里之行始於足下為者敗之執者失之當以愼終除微愼微除亂而以施為治之形名執之反生事原巧辟滋作故敗失也是以聖人無為故無敗無執故無失民之從事常於幾成而敗之不愼終也愼終如始則無敗事是以聖人欲不欲不貴難得之貨好欲雖微爭尚為之興難得之貨雖細貪盜為之起也學不學復衆人之所過不學而能者自然也喻於不學者過也故學不學以復衆人之所過以輔萬物之自然而不敢為古之善為道者非以明民將以愚之明謂多見巧詐蔽其朴也愚謂無知守真順自然也民之難治以其智多多智巧詐故難治也故以智治國國之賊智猶治也以智而治國所以謂之賊者故謂之智也民之難治以其多智也當務塞兊閉門令無知無欲而以智術動民邪心既動復以巧術防民之偽民知其術防隨而避之思惟密巧姦偽益滋故曰以智治國國之賊也不以智治國國之福知此兩者亦稽式常知稽式是謂玄德玄德深矣遠矣稽同也今古之所同則不可廢能知稽式是謂玄德玄德深矣遠矣與物反矣反其真也然後乃至大順江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上民必以言下之欲先民必以身後之是以聖人處上而民不重處前而民不害是以天下樂推而不厭以其不爭故天下莫能與之爭天下皆謂我道大似不肖夫唯大故似不肖若肖久矣其細也夫久矣其細猶曰其細久矣肖則失其所以為大矣故夫曰若肖久矣其細也我有三寶持而保之一曰慈二曰儉三曰不敢為天下先慈故能勇夫慈以陳則勝以守則固故能勇也儉故能廣節儉愛費天下不匱故能廣也不敢為天下先故能成器長唯後外其身為物所歸然後乃能立成器為天下利為物之長也今舍慈且勇且猶取也舍儉且廣舍後且先死矣夫慈以戰則勝相慜而不避於難故正也以守則固天將救之以慈衛之善為士者不武士卒之帥也武尚先陵人也善戰者不怒後而不先應而不唱故不在怒善勝敵者不與不與爭也善用人者為之下是謂不爭之德是謂用人之力用人而不為之下則力不為用也是謂配天古之極用兵有言吾不敢為主而為客不敢進寸而退尺是謂行無行彼逐不止攘無臂扔無敵行謂行陳也言以謙退哀慈不敢為物先用戰猶行無行攘無臂執無兵扔無敵也言無有與之抗也執無兵禍莫大於輕敵輕敵幾喪吾寶言吾哀慈謙退非欲以取強無敵於天下也不得已而卒至於無敵斯乃吾之所以為大禍也寶三寶也故曰幾亡吾寶故抗兵相加哀者勝矣抗舉也加當也哀者必相惜而不趣利避害故必勝吾言甚易知甚易行天下莫能知莫能行可不出户窺牖而知故曰甚易知也無為而成故曰甚易行也或於躁欲故曰莫之能知也迷於榮利故曰莫之能行也言有宗事有君宗萬物之宗也君萬物之主也夫唯無知是以不我知以其言有宗事有君之故故有知之人不得不知之也知我者希則我者貴唯深故知之者希也知我益希我亦無匹故曰知我者希則我者貴也是以聖人被褐懷玉被褐者同其塵懷玉者寶其真也聖人之所以難知以其同塵而不殊懷玉而不渝故難知而為貴也知不知上不知知病不知知之不足任則病也夫唯病病是以不病聖人不病以其病病是以不病民不畏威則大威至無狎其所居無厭其所生清靜無為謂之居謙後不盈謂之生離其清靜行其躁欲棄其謙後任其威權則物擾而民僻威不能復制民民不能堪其威則上下大潰矣天誅將至故曰民不畏威則大威至無狎其所居無厭其所生言威力不可任也夫唯不厭不自厭也是以不厭不自厭是以天下莫之厭是以聖人自知不自見不自見其所知以耀光行威也自愛不自貴自貴則物狎厭居生故去彼取此勇於敢則殺必不得其死也勇於不敢則活必齊命也此兩者或利或害俱勇而所施者異利害不同故曰或利或害也天之所惡孰知其故是以聖人猶難之孰誰也言誰能知天下之所惡意故邪其唯聖人夫聖人之明猶難於勇敢况無聖人之明而欲行之也故曰猶難之也天之道不爭而善勝天雖不爭故天下莫能與之爭不言而善應順則吉逆則凶不言而善應也不召而自來處下則物自歸繟然而善謀垂象而見吉凶先事而設誠安而不忘危未召而謀之故曰繟然而善謀也天網恢恢疏而不失民不畏死奈何以死懼之若使民常畏死而為奇者吾得執而殺之孰敢詭異亂群謂之奇也常有司殺者殺夫司殺者是大匠斫夫代大匠斫者希有不傷其手矣為逆順者之所惡忿也不仁者人之所疾也故曰常有司殺也民之飢以其上食稅之多是以飢民之難治以其上之有為是以難治民之輕死以其求生之厚是以輕死夫唯無以生為者是賢於貴生言民之所以僻治之所以亂皆由上不由其下也民從上也人之生也柔弱其死也堅強萬物草木之生也柔脆其死也枯稿故堅強者死之徒柔弱者生之徒是以兵強則不勝強兵以暴於天下者物之所惡也故必不得勝木強則共物所加也強大處下木之本也柔弱處上枝條是也天之道其猶張弓與高者抑之下者舉之有餘者損之不足者補之天之道損有餘而補不足人之道則不然與天地合德乃能包之如天之道如人之量則各有其身不得相均如唯無身無私乎自然然後乃能與天地合德損不足以奉有餘孰能有餘以奉天下唯有道者是以聖人為而不恃功成而不處其不欲見賢言唯能處盈而全虛損存以補無和光同塵蕩而均者唯其道也是以聖人不欲示其賢以均天下天下莫柔弱於水而攻堅強者莫之能勝其無以易之以用也其謂水也言用水之柔弱無物可以易之也弱之勝強柔之勝剛天下莫不知莫能行是以聖人云受國之垢是謂社稷主受國不祥是謂天下王正言若反和大怨必有餘怨不明理其契以致大怨已至而德以和之其傷不復故必有餘怨也安可以為善是以聖人執左契左契防怨之所由生也而不責於人有德司契有德之人念思其契不令怨生而後責於人也無德司徹徹司人之過也天道無親常與善人小國寡民國既小民又寡尚可使反古况國大民衆乎故舉小國而言也使有什伯之器而不用言使民雖有什伯之器而無所用之當何患不足也使民重死而不遠徙使民不用惟身是寶不貪貨賂故各安其居重死而不遠徙也雖有舟輿無所乘之雖有甲兵無所陳之使人復結繩而用之甘其食美其服安其居樂其俗鄰國相望雞犬之聲相聞民至老死不相往來無所欲求信言不美實在質也美言不信本在朴也善者不辨辨者不善知者不博極在一也博者不知聖人不積無私自有唯善是與任物而已既以為人己愈有物所尊也既以與人己愈多物所歸也天之道利而不害動常生成之也聖人之道為而不爭順天之利不相傷也道德真經注卷之四王弼老子道德經二卷真得老子之學歟蓋嚴君平指歸之流也其言仁義與禮不能自用必待道以用之天地萬物各得於一豈特有功於老子哉凡百學者蓋不可不知乎此也豫於是知弼本深於老子而易則末矣其於易多假諸老子之旨而老子無資於易者其有餘不足之迹斷可見也嗚呼學其難哉弼知佳兵者不祥之器至於戰勝以喪禮處之非老子之言乃不知常善救人故無棄人常善救物故無棄物獨得諸河上公而古本無有也賴傅奕能辨之爾然弼題是書曰道德經不析乎道德而上下之猶近於古歟其文字則多誤謬殆有不可讀者令人惜之嘗謂弼之於老子張湛之於列子郭象之於莊子杜預之於左氏范寧之於穀梁毛萇之於詩郭璞之於爾雅完然成一家之學後世雖有作者未易加也豫既繕寫弼書并以記之政和乙未十月丁丑嵩山朝説之鄜畤記克伏誦咸平聖語有曰老子道德經治世之要明皇解雖燦然可觀王弼所注言簡意深真得老氏清淨之旨克自此求弼所注甚力而近世希有蓋久而後得之往歲攝建寧學官嘗以刊行既又得朝以道先生所題本不分道德而上下之亦無篇目克喜其近古繕寫藏之乾道庚寅分教京口復鏤板以傳若其字之謬訛前人已不能證克焉敢輒易姑俟夫知者三月二十四日左從事郎充鎮江府府學教授熊克謹記
