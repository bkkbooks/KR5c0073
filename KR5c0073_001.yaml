front:
  text: 道德真經注卷之一得一
  hash: sha256:d96775050fdf6343cde8ad4d045c18eaec6d3f42af56c2bdb7210ff0c94e4bfa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0073_HFL_001-001a, image: hfl/0373/0373-066.png}
body:
  text: 山陽王弼注道可道非常道名可名非常名可道之道可名之名指事造形非其常也故不可道不可名也無名天地之始有名萬物之母凡有皆始於無故未形無名之時則為萬物之始及其有形有名之時則長之育之亭之毒之為其母也言道以無形無名始成萬物以始以成而不知其所以玄之又玄也故常無欲以觀其妙妙者微之極也萬物始於微而後成始於無而後生故常無欲空虛可以觀其始物之妙常有欲以觀其徼徼歸終也凡有之為利必以無為用欲之所本適道而後濟故常有欲可以觀其終物之徼也此兩者同出而異名同謂之玄玄之又玄衆妙之門兩者始與母也同出者同出於玄也異名所施不可同也在首則謂之始在終則謂之母玄者冥也默然無有也始母之所出也不可得而名故不可言同名曰玄而言謂之玄者取於不可得而謂之然也謂之然則不可以定乎一玄而已則是名則失之遠矣故曰玄之又玄也衆妙皆從同而出故曰衆妙之門也天下皆知美之為美斯惡已皆知善之為善斯不善已故有無相生難易相成長短相較高下相傾音聲相和前後相隨美者人心之所進樂也惡者人心之所惡疾也美惡猶喜怒也善不善猶是非也喜怒同根是非同門故不可得遍舉也此六者皆陳自然不可遍舉之明數也是以聖人處無為之事自然已足為則敗也行不言之教萬物作焉而不辭生而不有為而不恃智慧自備為則偽也功成而弗居因物而用功自彼成故不居也夫唯弗居是以不去使功在己則功不可久也不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂賢猶能也尚者嘉之名也貴者隆之稱也唯能是任尚也曷為唯用是施貴之何為尚賢顯名榮過其任為而常校能相射貴貨過用貪者競趣穿窬探篋沒命而盜故可欲不見則心無所亂也是以聖人之治虛其心實其腹心懷智而腹懷食虛有智而實無知也弱其志強其骨骨無知以幹志生事以亂常使民無知無欲守其真也使夫知者不敢為也知者謂知為也為無為則無不治道沖而用之或不盈淵兮似萬物之宗挫其鋭解其紛和其光同其塵湛兮似或存吾不知誰之子象帝之先夫執一家之量者不能全家執一國之量者不能成國窮力舉重不能為用故人雖知萬物治也治而不以二儀之道則不能贍也地雖形魄不法于天則不能全其寧天雖精象不法于道則不能保其精沖而用之用乃不能窮滿以造實實來則溢故沖而用之又復不盈其為無窮亦已極矣形雖大不能纍其體事雖殷不能充其量萬物舍此而求主主其安在乎不亦淵兮似萬物之宗乎鋭挫而無損紛解而不勞和光而不汙其體同塵而不渝其真不亦湛兮似或存乎地守其形德不能過其載天懷其象德不能過其覆天地莫能及之不亦似帝之先乎帝天帝也天地不仁以萬物為芻狗天地任自然無為無造萬物自相治理故不仁也仁者必造立施化有恩有為造立施化則物失其真有恩有為則物不具存物不具存則不足以備載矣地不為獸生芻而獸食芻不為人生狗而人食狗無為於萬物而萬物各適其所用則莫不贍矣若慧由己樹未足任也聖人不仁以百姓為芻狗聖人與天地合其德以百姓比芻狗也天地之間其猶橐籥乎虛而不屈動而愈出橐排橐也籥樂籥也橐籥之中空洞無情無為故虛而不得窮屈動而不可竭盡也天地之中蕩然任自然故不可得而窮猶若橐籥也多言數窮不如守中愈為之則愈失之矣物樹其惡事錯其言不濟不言不理必窮之數也橐籥而守數中則無窮盡棄己任物則莫不理若橐籥有意於為聲也則不足以共吹者之求也谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤谷神谷中央無谷也無形無影無逆無違處卑不動守靜不衰谷以之成而不見其形此至物也處卑而不可得名故謂天地之根綿綿若存用之不勤門玄牝之所由也本其所由與極同體故謂之天地之根也欲言存邪則不見其形欲言亡邪萬物以之生故綿綿若存也無物不成用而不勞也故曰用而不勤也天長地久天地所以能長且久者以其不自生自生則與物爭不自生則物歸也故能長生是以聖人後其身而身先外其身而身存非以其無私耶故能成其私無私者無為於身也身先身存故曰能成其私也上善若水水善利萬物而不爭處衆人之所惡人惡卑也故幾於道道無水有故曰幾也居善地心善淵與善仁言善信正善治事善能動善時夫唯不爭故無尤言人皆應於治道也持而盈之不如其已持謂不失德也既不失其德又盈之勢必傾危故不如其已者謂乃更不如無德無功者也揣而鋭之不可長保既揣末令尖又鋭之令利勢必摧衄故不可長保也金玉滿堂莫之能守不若其已當貴而驕自遺其咎不可長保也功遂身退天之道四時更運功成則移載營魄抱一能無離乎載猶處也營魄人之常居處也一人之真也言人能處常居之宅抱一清神能常無離乎則萬物自賔也專氣致柔能嬰兒乎專任也致極也言任自然之氣致至柔之和能若嬰兒之無所欲乎則物全而性得矣滌除玄覽能無疵乎玄物之極也言能滌除邪飾至於極覽能不以物介其明疵之其神乎則終與玄同也愛民治國能無知乎任術以求成運數以求匿者智也玄覽無疵猶絶聖也治國無以智猶棄智也能無以智乎則民不辟而國治之也天門開闔能為雌乎天門謂天下之所由從也開闔治亂之際也或開或闔經通於天下故曰天門開闔也雌應而不昌因而不為言天門開闔能為雌乎則物自賔而處自安矣明白四達能無知乎言至明四達無迷無惑能無以為乎則物化矣所謂道常無為侯王若能守則萬物自化生之不塞其原也畜之不禁其性也生而不有為而不恃長而不宰是謂玄德不塞其原則物自生何功之有不禁其性則物自濟何為之恃物自長足不吾宰成有德無主非玄如何凡言玄德皆有德而不知其主出乎幽冥三十輻共一轂當其無有車之用轂所以能統三十輻者無也以其無能受物之故故能以實統衆也埏埴以為器當其無有器之用鑿户牖以為室當其無有室之用故有之以為利無之以為用木埴壁所以成三者而皆以無為用也言無者有之所以為利皆賴無以為用也五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂爽差失也失口之用故謂之爽夫耳目口心皆順其性也不以順性命反以傷自然故曰盲聾爽狂也難得之貨令人行妨難得之貨塞人正路故令人行妨也是以聖人為腹不為目故去彼取此為腹者以物養己為目者以物役己故聖人不為目也寵辱若驚貴大患若身何謂寵辱若驚寵為下得之若驚失之若驚是謂寵辱若驚寵必有辱榮必有患驚辱等榮患同也為下得寵辱榮患若驚則不足以亂天下也何謂貴大患若身大患榮寵之屬也生之厚必入死之地故謂之大患也人迷之於榮寵返之於身故曰大患若身也吾所以有大患者為吾有身由有其身也及吾無身歸之自然也吾有何患故貴以身為天下若可寄天下無以易其身故曰貴也如此乃可以託天下也愛以身為天下若可託天下無物可以損其身故曰愛也如此乃可以寄天下也不以寵辱榮患損易其身然後乃可以天下付之也視之不見名曰夷聽之不聞名曰希搏之不得名曰微此三者不可致詰故混而為一無狀無象無聲無響故能無所不通無所不往不得而知更以我耳目體不知為名故不可致詰混而為一也其上不皎其下不昧繩繩不可名復歸於無物是謂無狀之狀無物之象欲言無邪而物由以成欲言有邪而不見其形故曰無狀之狀無物之象也是謂惚恍不可得而定也迎之不見其首隨之不見其後執古之道以御今之有有有其事能知古始是謂道紀無形無名者萬物之宗也雖今古不同時移俗易故莫不由乎此以成其治者也故可執古之道以御今之有上古雖遠其道存焉故雖在今可以知古始也古之善為士者微妙玄通深不可識夫唯不可識故強為之容豫兮若冬涉川冬之涉川豫然若欲度若不欲度其情不可得見之貌也猶兮若畏四鄰四鄰合攻中央之主猶然不知所趣向者也上德之人其端兆不可覩德趣不可見亦猶此也儼兮其若容涣兮若冰之將釋敦兮其若朴曠兮其若谷混兮其若濁凡此諸若皆言其容象不可得而形名也孰能濁以靜之徐清孰能安以久動之徐生夫晦以理物則得明濁以靜物則得清安以動物則得生此自然之道也孰能者言其難也徐者詳愼也保此道者不欲盈盈必溢也夫唯不盈故能蔽不新成蔽覆蓋也致虛極守靜篤言致虛物之極篤守靜物之真正也萬物並作動作生長吾以觀復以虛靜觀其反復凡有起於虛動起於靜故萬物雖並動作卒復歸於虛靜是物之極篤也夫物藝藝各復歸其根各反其所始也歸根曰靜是謂復命復命曰常歸根則靜故曰靜靜則復命故曰復命也復命則得性命之常故曰常也知常曰明不知常妄作凶常之為物不偏不彰無皎昧之狀溫涼之象故曰知常曰明也唯此復乃能包通萬物無所不容失此以往則邪入乎分則物離分故曰不知常則妄作凶也知常容無所不包通也容乃公無所不包通則乃至于蕩然公平也公乃王蕩然公平則乃至于無所不周普也王乃天無所不周普則乃至于同乎天也天乃道與天合德體道大通則乃至于極虛無也道乃久窮極虛無得道之常則乃至于不有極也沒身不殆無之為物水火不能害金石不能殘用之於心則虎兕無所投其齒角兵戈無所容其鋒刃何危殆之有乎太上下知有之太上謂大人也大人在上故曰太上大人在上居無為之事行不言之教萬物作焉而不為始故下知有之而已其次親而譽之不能以無為居事不言為教立善行施使下得親而譽之也其次畏之不能復以恩仁令物而賴威權也其次侮之不能法以正齊民而以智治國下知避之其令不從故曰侮之也信不足焉有不信焉言從上也夫御體失性則疾病生輔物失真則疵釁作信不足焉則有不信此自然之道也己處不足非智之所濟也悠兮其貴言功成事遂百姓皆謂我自然自然其端兆不可得而見也其意趣不可得而覩也無物可以易其言言必有應故曰悠兮其貴言也居無為之事行不言之教不以形立物故功成事遂而百姓不知其所以然也大道廢有仁義失無為之事更以施慧立善道進物也智慧出有大偽行術用明以察姦偽趣覩形見物知避之故智慧出則大偽生也六親不和有孝慈國家昏亂有忠臣甚美之名生於大惡所謂美惡同門六親父子兄弟夫婦也若六親自和國家自治則孝慈忠臣不知其所在矣魚相忘於江湖之道則相濡之德生也絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有此三者以為文不足故令有所屬見素抱朴少私寡欲聖智才之善也仁義人之善也巧利用之善也而直云絶文甚不足不令之有所屬無以見其指故曰此三者以為文而未足故令人有所屬屬之於素朴寡欲絶學無憂唯之與阿相去幾何善之與惡相去若何人之所畏不可不畏下篇為學者日益為道者日損然則學求益所能而進其智者也若將無欲而足何求於益不知而中何求於進夫鸞雀有匹鳩鴿有仇寒鄉之民必知旃裘自然已足益之則憂故續鳧之足何異截鶴之脛畏譽而進何異畏刑唯阿美惡相去何若故人之所畏吾亦畏焉未敢恃之以為用也荒兮其未央哉歎與俗相返之遠也衆人熙熙如享太牢如春登臺衆人迷於美進惑於榮利欲進心競故熙熙若享太牢如春登臺也我獨怕兮其未兆如嬰兒之未孩言我廓然無形之可名無兆之可舉如嬰兒之未能孩也儽儽兮若無所歸若無所宅衆人皆有餘而我獨若遺衆人無不有懷有志盈溢胸心故曰皆有餘也我獨廓然無為無欲若遺失之也我愚人之心也哉絶愚之人心無所别析意無所好欲猶然其情不可覩我頽然若此也沌沌兮無所别析不可為明俗人昭昭耀其光也我獨若昏俗人察察分别别析也我獨悶悶淡兮其若海情不可覩飂兮若無止無所繫縶衆人皆有以以用也皆欲有所施用也而我獨頑似鄙無所欲為悶悶昏昏若無所識故曰頑且鄙也我獨異於人而貴食母食母生之本也人者皆棄生民之本貴末飾之華故曰我獨欲異於人道德真經注卷之一
