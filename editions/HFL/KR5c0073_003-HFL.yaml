front:
  text: 道德眞經註卷之三得五
  hash: sha256:b7aa8287e67808882faced80adc737477e01cf4ed6a69d7eb90282947e9ba951
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0073_HFL_003-001a, image: hfl/0373/0373-116.png}
body:
  text: 山陽王弼註上德不德是以有德下德不失德是以無德上德無爲而無以爲下德爲之而有以爲上仁爲之而無以爲上義爲之而有以爲上禮爲之而莫之應則攘臂而扔之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首前識者道之華而愚之始是以大丈夫處其厚不居其薄處其實不居其華故去彼取此德者得也常得而無喪利而無害故以德爲名焉何以得德由乎道也何以盡德以無爲用以無爲用則莫不載也故物無焉則無物不經有爲則不足以免其生是以天地雖廣以無爲心聖王雖大以虚爲主故曰以復而視則天地之心見至日而思之則先王之至覩也故滅其私而無其身則四海莫不瞻遠近莫不至殊其己而有其心則一體不能自全肌骨不能相容是以上德之人唯道是用不德其德無執無用故能有德而無不爲不求而得不爲而成故雖有德而無德名也下德求而得之爲而成之則立善以治物故德名有焉求而得之必有失焉爲而成之必有敗焉善名生則有不善應焉故下德爲之而有以爲也無以爲者無所偏爲也凡不能無爲而爲之者皆下德也仁義禮節是也將明德之上下輒舉下德以對上德至于無以爲極下德下之量上仁是也足及於無以爲而猶爲之焉爲之而無以爲故有爲爲之患矣本在無爲母在無名棄本捨母而適其子功雖大焉必有不濟名雖美焉僞亦必生不能不爲而成不興而治則乃爲之故有弘普博施仁愛之者而愛之無所偏私故上仁爲之而無以爲也愛不能兼則有抑抗正眞而義理之者忿枉祐直助彼攻此物事而有以心爲矣故上義爲之而有以爲也直不能篤則有游飾修文禮敬之者尚好修敬校責往來則不對之間忿怒生焉故上禮爲之而莫之應則攘臂而扔之夫大之極也其唯道乎自此已往豈足尊哉故雖德盛業大富而有萬物猶各得其德而未能自周也故天不能爲載地不能爲覆人不能爲贍萬物雖貴以無爲用不能捨無以爲體也不能捨無以爲體則失其爲大矣所謂失道而後德也以無爲用德其母故能己不勞焉而物無不理下此已往則失用之母不能無爲而貴博施不能博施而貴正直不能正直而貴飾敬所謂失德而後仁失仁而後義失義而後禮也夫禮也所始首於忠信不篤通簡不陽責備於表機微爭制夫仁義發於内爲之猶僞况務外飾而可乆乎故夫禮者忠信之薄而亂之首也前識者前人而識也即下德之倫也竭其聰明以爲前識役其智力以營庶事雖德其情姦巧彌密雖豐其譽愈喪篤實勞而事昏務而治薉雖竭聖智而民愈害舍己任物則無爲而泰守夫素樸則不順典制聽彼所獲棄此所守識道之華而愚之首故苟得其爲功之母則萬物作焉而不辭也萬事存焉而不勞也用不以形御不以名故仁義可顯禮敬可彰也夫載之以大道鎭之以無名則物無所尚志無所營各任其貞事用其誠則仁德厚焉行義正焉禮敬清焉棄其所載舍其所生用其成形役其聰明仁則誠焉義其競焉禮其爭焉故仁德之厚非用仁之所能也行義之正非用義之所成也禮敬之清非用禮之所濟也載之以道統之以母故顯之而無所尚彰之而無所競用夫無名故名以篤焉用夫無形故形以成焉守母以存其子崇本以舉其末則形名俱有而邪不生大美配天而華不作故母不可遠本不可失仁義母之所生非可以爲母形器匠之所成非可以爲匠也捨其母而用其子棄其本而適其末名則有所分形則有所止雖極其大必有不周雖盛其美必有患憂功在爲之豈足處也昔之得一者昔始也一數之始而物之極也各是一物之生所以爲主也物皆各得此一以成既成而舍以居成居成則失其母故皆裂發歇竭滅蹷也天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以爲天下貞其致之各以其一致此清寧靈盈生貞天無以清將恐裂用一以致清耳非用清以清也守一則清不失用清則恐裂也故爲功之母不可舍也是以皆無用其功恐喪其本也地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貴高將恐蹷故貴以賤爲本高以下爲基是以侯王自謂孤寡不穀此非以賤爲本耶非乎故致數譽無譽不欲琭琭如玉珞珞如石清不能爲清盈不能爲盈皆有其母以存其形故清不足貴盈不足多貴在其母而母無貴形貴乃以賤爲本高乃以下爲基故致數譽乃無譽也玉石琭琭珞珞體盡於形故不欲也反者道之動高以下爲基貴以賤爲本有以無爲用此其反也動皆知其所無則物通矣故曰反者道之動也弱者道之用柔弱同通不可窮極天下萬物生於有有生於無天下之物皆以有爲生有之所始以無爲本將欲全有必反於無也上士聞道勤而行之有志也中士聞道若存若亡下士聞道大笑之不笑不足以爲道故建言有之建猶立也明道若昧光而不耀進道若退後其身而身先外其身而身存夷道若纇纇㘨也大夷之道因物之性不執平以割物其平不見乃更反若纇㘨也上德若谷不德其德無所懷也太白若辱知其白守其黑大白然後乃得廣德若不足廣德不盈廓然無形不可滿也建德若偷偷匹也建德者因物自然不立不施故若偷匹質眞若渝質眞者不矜其眞故渝大方無隅方而不割故無隅也大器晚成大器成天下不持全别故必晚成也大音希聲聽之不聞名曰希不可得聞之音也有聲則有分有分則不宫而商矣分則不能統衆故有聲者非大音也大象無形有形則有分有分者不温則炎不炎則寒故象而形者非大象道隱無名夫唯道善貸且成凡此諸善皆是道之所成也在象則爲大象而大象無形在音則爲大音而大音希聲物以之成而不見其成形故隱而無名也貸之非唯供其乏而已一貸之則足以永終其德故曰善貸也成之不加機匠之裁無物而不濟其形故曰善成道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以爲和人之所惡唯孤寡不穀而王公以爲稱故物或損之而益或益之而損萬物萬形其歸一也何由致一由於無也由無乃一一可謂無已謂之一豈得無言乎有言有一非二如何有一有二遂生乎三從無之有數盡乎斯過此以往非道之流故萬物之生吾知其主雖有萬形冲氣一焉百姓有心異國殊風而得一者王侯主焉以一爲主一何可舍愈多愈遠損則近之損之至盡乃得其極既謂之一猶乃至三况本不一而道可近乎損之而益豈虚言也人之所教我亦教之我之非强使人從之也而用夫自然舉其至理順之必吉違之必凶故人相教違之必自取其凶也亦如我之教人勿違之也强梁者不得其死吾將以爲教父强梁則必不得其死人相教爲强梁則必如我之教人不當爲强梁也舉其强梁不得其死以教耶若云順吾教之必吉也故得其違教之徒適可以爲教父也天下之至柔馳騁天下之至堅氣無所不入水無所不出於經無有入無間吾是以知無爲之有益虚無柔弱無所不通無有不可窮至柔不可折以此推之故知無爲之有益也不言之教無爲之益天下希及之名與身孰親尚名好高其身必䟽身與貨孰多貪貨無厭其身必少得與亡孰病得多利而亡其身何者爲病也是故甚愛必大費多藏必厚亡甚愛不與物通多藏不與物散求之者多攻之者衆爲物所病故大費厚亡也知足不辱知止不殆可以長久大成若缺其用不弊隨物而成不爲一象故若缺也大盈若冲其用不窮大盈充足隨物而興無所愛矜故若冲也大直若屈隨物而直直不在一故若屈也大巧若拙大巧因自然以成器不造爲異端故若拙也大辯若訥大辯因物而言己無所造故若訥也躁勝寒靜勝熱清靜爲天下正躁罷然後勝寒靜無爲以勝熱以此推之則清靜爲天下正也靜則全物之眞躁則犯物之性故唯清靜乃得如上諸大也天下有道却走馬以糞天下有道知足知止無求於外各修其内而已故却走馬以治田糞也天下無道戎馬生於郊貪欲無厭不修其内各求於外故戎馬生於郊也禍莫大於不知足咎莫大於欲得故知足之足常足矣不出户知天下不闚牖見天道事有宗而物有主途雖殊而同歸也慮雖百而其致一也道有大常理有大致執古之道可以御今雖處於今可以知古始故不出户窺牖而可知也其出彌遠其知彌少無在於一而求之於衆也道視之不可見聽之不可聞搏之不可得如其知之不須出户若其不知出愈遠愈迷也是以聖人不行而知不見而名得物之致故雖不行而慮可知也識物之宗故雖不見而是非之理可得而名也不爲而成明物之性因之而已故雖不爲而使之成矣爲學日益務欲進其所能益其所習爲道曰損務欲反虚無也損之又損以至於無爲無爲而無不爲有爲則有所失故無爲乃無所不爲也取天下常以無事動常因也及其有事自已造也不足以取天下失統本也聖人無常心以百姓心爲心動常因也善者吾善之不善者吾亦善之各因其用則善不失也德善無棄人也信者吾信之不信者吾亦信之德信聖人在天下歙歙爲天下渾其心百姓皆注其耳目各用聰明聖人皆孩之皆使和而無欲如嬰兒也夫天地設位聖人成能人謀鬼謀百姓與能者能者與之資者取之能大則大資貴則貴物有其宗事有其主如此則可冕旒充目而不懼於欺黈纊塞耳而無戚於慢又何爲勞一身之聰明以察百姓之情哉夫以明察物物亦競以其明應之以不信察物物亦競以不信應之夫天下之心不必同其所應不敢異則莫肯用其情矣甚矣害之大也莫大於用其明矣夫在智則人與之訟在力則人與之爭智不出於人而立乎訟地則窮矣力不出於人而立乎爭地則危矣未有能使人無用其智力乎已者也如此則己以一敵人而人以千萬敵己也若乃多其法綱煩其刑罰塞其徑路攻其幽宅則萬物失其自然百姓喪其手足鳥亂於上魚亂於下是以聖人之於天下歙歙焉心無所主也爲天下渾心焉意無所適莫也無所察焉百姓何避無所求焉百姓何應無避無應則莫不用其情矣人無爲舍其所能而爲其所不能舍其所長而爲其所短如此則言者言其所知行者行其所能百姓各皆注其耳目焉吾皆孩之而已出生入死出生地入死地生之徒十有三死之徒十有三人之生動之死地十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地十有三猶云十分有三分取其生道全生之極十分有三耳取死之道全死之極十分亦有三耳而民生生之厚更之無生之地焉善攝生者無以生爲生故無死地也器之害者莫甚乎戈兵獸之害者莫甚乎兕虎而令兵戈無所容其鋒刃虎兕無所措其爪角斯誠不以欲累其身者也何死地之有乎夫蚖蟺以淵爲淺而鑿穴其中鷹鸇以山爲卑而增巢其上矰繳不能及網罟不能到可謂處於無死地矣然而卒以甘餌乃入於無生之地豈非生生之厚乎故物苟不以求離其本不以欲渝其眞雖入軍而不害陸行而不可犯也赤子之可則而貴信矣道生之德畜之物形之勢成之物生而後畜畜而後形形而後成何由而生道也何得而畜德也何由而形物也何使而成勢也唯因也故能無物而不形唯勢也故能無物而不成凡物之所以生功之所以成皆有所由有所由焉則莫不由乎道也故推而極之亦至道也隨其所因故各有稱焉是以萬物莫不尊道而貴德道者物之所由也德者物之所得也由之乃得故曰不得不失尊之則害不得不貴也道之尊德之貴夫莫之命常自然命並作爵故道生之德畜之長之育之亭之毒之養之覆之謂成其實各得其庇蔭不傷其體矣生而不有爲而不恃爲而不有長而不宰是謂玄德有德而不知其主也出乎幽冥故謂之玄德也天下有始以爲天下母善始之則善養畜之矣故天下有始則可以爲天下母矣既知其母復知其子既知其子復守其母没其不殆母本也子末也得本以知末不舍本以逐末也塞其兊閉其門兊事欲之所由生門事欲之所由從也終身不勤無事永逸故終身不勤也開其兊濟其事終身不救不問其原而濟其事故雖終身不救見小曰明守柔曰强爲治之功不在大見大不明見小乃明守强不强守柔乃强也用其光顯道以去民迷復歸其明不明察也無遺身殃是謂習常道之常也使我介然有知行於大道唯施是畏言若使我可介然有知行大道於天下唯施爲之是畏也大道甚夷而民好徑言大道蕩然正平而民猶尚舍之而不由好從邪徑况復施爲以塞大道之中乎故曰大道甚夷而民好徑朝甚除朝宫室也除絜好也田甚蕪倉甚虛朝甚除則田甚蕪倉甚虚設一而衆害生也服文綵帶利劍厭飲食財貨有餘是謂盜夸非道也哉凡物不以其道得之則皆邪也邪則盜也夸而不以其道得之竊位也故舉非道以明非道則皆盜夸也善建不拔固其根而後營其末故不拔也善抱者不脱不貪於多齊其所能故不脱也子孫以祭祀不輟子孫傳此道以祭祀則不輟也修之於身其德乃眞修之於家其德乃餘以身及人也修之身則眞修之家則有餘修之不廢所施轉大修之於鄉其德乃長修之於國其德乃豐修之於天下其德乃普故以身觀身以家觀家以鄉觀鄉以國觀國彼皆然也以天下觀天下以天下百姓心觀天下之道也天下之道逆順吉凶亦皆如人之道也吾何以知天下然哉以此此上之所云也言吾何以得知天下乎察己以知之不求於外也所謂不出户以知天下者也含德之厚比於赤子蜂蠆虺蛇不螫猛獸不據攫鳥不搏赤子無求無欲不犯衆物故毒蟲之物無犯之人也含德之厚者不犯於物故無物以損其全也骨弱筋柔而握固以柔弱之故故握能周固未知牝牡之合而全作作長也無物以損其身故能全長也言含德之厚者無物可以損其德渝其眞柔弱不爭而不摧折皆若此也精之至也終日號而不嗄無爭欲之心故終日出聲而不嗄也和之至也知和曰常物以和爲常故知和則得常也知常曰明不皦不昧不温不凉此常也無形不可得而見曰明也益生曰祥生不可益益之則夭也心使氣曰强心宜無有使氣則强物壯則老謂之不道不道早已知者不言因自然也言者不知造事端也塞其兊閉其門挫其鋭含守質也解其分除爭原也和其光無所特顯則物無偏爭也同其塵無所特賤則物無偏恥也是謂玄同故不可得而親不可得而䟽可得而親則可得而䟽也不可得而利不可得而害可得而利則可得而害也不可得而貴不可得而賤可得而貴則可得而賤也故爲天下貴無物可以加之也以正治國以奇用兵以無事取天下以道治國則國平以正治國則奇正起也以無事則能取天下也上章云其取天下者常以無事及其有事又不足以取天下也故以正治國則不足以取天下而以奇用兵也夫以道治國崇本以息末以正治國立辟以攻末本不立而末淺民無所及故必至於奇用兵也吾何以知其然哉以此天下多忌諱而民彌貧民多利器國家滋昏利器凡所以利己之器也民强則國家弱人多伎巧奇物滋起民多智慧則巧僞生巧僞生則邪事起法令滋彰盜賊多有立正欲以息邪而奇兵用多忌諱欲以恥貧而民彌貧利器欲以强國者也而國愈昏多皆舍本以治末故以致此也故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸上之所欲民從之速也我之所欲唯無欲而民亦無欲而自樸也此四者崇本以息末也其政悶悶其民淳淳言善治政者無形無名無事無正可舉悶悶然卒至於大治故曰其政悶悶也其民無所爭競寬大淳淳故曰其民淳淳也其政察察其民缺缺立刑名明賞罰以檢姦僞故曰察察也殊類分析民姦爭競故曰其民缺缺禍兮福之所倚福兮禍之所伏孰知其極其無正言誰知善治之極乎唯無可正舉無可形名悶悶然而天下大化是其極也正復爲奇以正治國則便復以奇用兵矣故曰正復爲奇善復爲妖立善以和萬物則便復有妖之患也人之迷其日固乆言人之迷惑失道固乆矣不可便正善治以責是以聖人方而不割以方導物舍去其邪不以方割物所謂大方無隅廉而不劌廉清廉也劌傷也以清廉清民令去其邪令去其汙不以清廉劌傷於物也直而不肆以直導物令去其僻而不以直激沸於物也所謂直若屈也光而不燿以光鑒其所以迷不以光照求其隱匿也所謂明道若昧也此皆崇本以息末不攻而使復之也道德眞經註卷之三
