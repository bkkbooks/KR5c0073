front:
  text: 道德真經注卷之二得四
  hash: sha256:bbb87c5cd4ff982962e98e39293edce03a57f9bf3e985d8996ffec6c4ea3df75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0073_HFL_002-001a, image: hfl/0373/0373-092.png}
body:
  text: 山陽王弼注孔德之容唯道是從孔空也唯以空為德然後乃能動作從道道之為物唯恍唯惚恍惚無形不繫之歎忽兮恍兮其中有象恍兮忽兮其中有物以無形始物不繫成物萬物以始以成而不知其所以然故曰恍兮惚兮惚兮恍兮其中有象也窈兮冥兮其中有精窈冥深遠之歎深遠不可得而見然而萬物由之其可得見以定其真故曰窈兮冥兮其中有精也其精甚真其中有信信信驗也物反窈冥則真精之極得萬物之性定故曰其精甚真其中有信也自古及今其名不去至真之極不可得名無名則是其名也自古及今無不由此而成故曰自古及今其名不去也以閲衆甫衆甫物之始也以無名説萬物始也吾何以知衆甫之狀哉以此此上之所云也言吾何以知萬物之始於無哉以此知之也曲則全不自見則其明全也枉則直不自是則其是彰也窪則盈不自伐則其功有也弊則新不自矜則其德長也少則得多則惑自然之道亦猶樹也轉多轉遠其根轉少轉得其本多則遠其真故曰惑也少則得其本故曰得也是以聖人抱一為天下式一少之極也式猶則之也不自見故明不自是故彰不自伐故有功不自矜故長夫唯不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之希言自然聽之不聞名曰希下章言道之出言淡兮其無味也視之不足見聽之不足聞然則無味不足聽之言乃是自然之至言也故飄風不終朝驟雨不終日孰為此者天地天地尚不能久而况於人乎言暴疾美興不長也故從事於道者道者同於道從事謂舉動從事於道者也道以無形無為成濟萬物故從事於道者以無為為君不言為教綿綿若存而物得其真與道同體故曰同於道德者同於德得少也少則得故曰得也行得則與得同體故曰同於得也失者同於失失纍多也纍多則失故曰失也行失則與失同體故曰同於失也同於道者道亦樂得之同於德者德亦樂得之同於失者失亦樂得之言隨行其所故同而應之信不足焉有不信焉忠信不足於下焉有不信也企者不立物尚進則失安故曰企者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其在道也曰餘食贅行其唯於道而論之若卻至之行盛饌之餘也本雖美更可薉也本雖有功而自伐之故更為疣贅者也物或惡之故有道者不處有物混成先天地生混然不可得而知而萬物由之以成故曰混成也不知其誰之子故先天地生寂兮寥兮獨立不改寂寞無形體也無物之匹故曰獨立也返化終始不失其常故曰不改也周行而不殆可以為天下母周行無所不至而免殆能生全大形也故可以為天下母也吾不知其名名以定形混成無形不可得而定故曰不知其名也字之曰道夫名以定形字以稱可言道取於無物而不由也是混成之中可言之稱最大也強為之名曰大吾所以字之曰道者取其可言之稱最大也責其字定之所由則繫於大大有繫則必有分有分則失其極矣故曰強之為名曰大大曰逝逝行也不守一大體而已周行無所不至故曰逝也逝曰遠遠曰反遠極也周無所不窮極不偏於一逝故曰遠也不隨於所適其體獨立故曰反也故道大天大地大王亦大天地之性人為貴而王是人之主也雖不職大亦復為大與三匹故曰王亦大也域中有四大四大道天地王也凡物有稱有名則非其極也言道則有所由有所由然後謂之為道然則是道稱中之大也不若無稱之大也無稱不可得而名曰域也道天地王皆在乎無稱之內故曰域中有四大者也而王居其一焉處人主之大也人法地地法天天法道道法自然法謂法則也人不違地乃得全安法地也地不違天乃得全載法天也天不違道乃得全覆法道也道不違自然乃得其性法自然者在方而法方在圓而法圓於自然無所違也自然者無稱之言窮極之辭也用智不及無知而形魄不及精象精象不及無形有儀不及無儀故轉相法也道順自然天故資焉天法於道地故則焉地法於天人故象焉所以為主其一之者主也重為輕根靜為躁君凡物輕不能載重小不能鎮大不行者使行不動者制動是以重必為輕根靜必為躁君也是以聖人終日行不離輜重以重為本故不離雖有榮觀燕處超然不以經心也奈何萬乘之主而以身輕天下輕則失本躁則失君輕不鎮重也失本為喪身也失君為失君位也善行無轍迹順自然而行不造不始故物得至而無轍迹也善言無瑕謫順物之性不别不析故無瑕謫可得其門也善數不用籌策因物之數不假形也善閉無關楗而不可開善結無繩約而不可解因物自然不設不施故不用關楗繩約而不可開解也此五者皆言不造不施因物之性不以形制物也是以聖人常善救人故無棄人聖人不立形名以檢於物不造進向以殊棄不肖輔萬物之自然而不為始故曰無棄人也不尚賢能則民不爭不貴難得之貨則民不為盜不見可欲則民心不亂常使民心無欲無惑則無棄人矣常善救物故無棄物是謂襲明故善人者不善人之師舉善以師不善故謂之師矣不善人者善人之資資取也善人以善齊不善以善棄不善也故不善人善人之所取也不貴其師不愛其資雖智大迷雖有其智自任其智不因物於其道必失故曰雖智大迷是謂要妙知其雄守其雌為天下溪為天下溪常德不離復歸於嬰兒雄先之屬雌後之屬也知為天下之先也必後也是以聖人後其身而身先也溪不求物而物自歸之嬰兒不用智而合自然之智知其白守其黑為天下式式模則也為天下式常德不忒忒差也復歸於無極不可窮也知其榮守其辱為天下谷為天下谷常德乃足復歸於朴此三者言常反終後乃德全其所處也下章云反者道之動也功不可取常處其母也朴散則為器聖人用之則為官長朴真也真散則百行出殊類生若器也聖人因其分散故為之立官長以善為師不善為資移風易俗復使歸於一也故大制不割大制者以天下之心為心故無割也將欲取天下而為之吾見其不得已天下神器神無形無方也器合成也無形以合故謂之神器也不可為也為者敗之執者失之萬物以自然為性故可因而不可為也可通而不可執也物有常性而造為之故必敗也物有往來而執之故必失矣故物或行或隨或歔或吹或強或羸或挫或隳是以聖人去甚去奢去泰凡此諸或言物事逆順反覆不施為執割也聖人達自然之至暢萬物之情故因而不為順而不施除其所以迷去其所以惑故心不亂而物性自得之也以道佐人主者不以兵強天下以道佐人主尚不可以兵強於天下况人主躬於道者乎其事好還為始者務欲立功生事而有道者務欲還反無為故云其事好還也師之所處荆棘生焉大軍之後必有凶年言師凶害之物也無有所濟必有所傷賊害人民殘荒田畝故曰荆棘生也善有果而已不敢以取強果猶濟也言善用師者趣以濟難而已矣不以兵力取強於天下矣果而勿矜果而勿伐果而勿驕吾不以師道為尚不得已而用何矜驕之有也果而不得已果而勿強言用兵雖趣功果濟難然時故不得已當復用者但當以除暴亂不遂用果以為強也物壯則老是謂不道不道早已壯武力暴興也喻以兵強於天下者也飄風不終朝驟雨不終日故暴興必不道早已也夫佳兵者不祥之器物惑惡之故有道者不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡為上勝而不美而美之者是樂殺人夫樂殺人者則不可以得志於天下矣吉事尚左凶事尚右偏將軍居左上將軍居右言以喪禮處之殺人之衆以悲哀泣之戰勝以喪禮處之道常無名天下莫能臣也侯王若能守之萬物將自賔道無形不繫常不可名以無名為常故曰道常無名也朴之為物以無為心也亦無名故將得道莫若守朴夫智者可以能臣也勇者可以武使也巧者可以事役也力者可以重任也朴之為物憒然不偏近於無有故曰莫能臣也抱朴為無不以物纍其真不以欲害其神則物自賔而道自得也天地相合以降甘露民莫之令而自均言天地相合則甘露不求而自降我守其真性無為則民不令而自均也始制有名名亦既有夫亦將知止知止所以不殆始制謂朴散始為官長之時也始制官長不可不立名分以定尊卑故始制有名也過此以往將爭錐刀之末故曰名亦既有夫亦將知止也遂任名以號物則失治之母也故知止所以不殆也譬道之在天下猶川谷之與江海川谷之以求江與海非江海召之不召不求而自歸者世行道於天下者不令而自均不求而自得故曰猶川谷之與江海也知人者智自知者明知人者智而已矣未若自知者超智之上也勝人者有力自勝者強勝人者有力而已矣未若自勝者無物以損其力用其智於人未若用其智於己也用其力於人未若用其力於己也明用於己則物無避焉力用於己則物無改焉知足者富知足自不失故富也強行者有志勤能行之其志必獲故曰強行者有志矣不失其所者久以明自察量力而行不失其所必獲久長矣死而不亡者壽雖死而以為生之道不亡乃得全其壽身沒而道猶存况身存而道不卒乎大道泛兮其可左右言道泛濫無所不適可左右上下周旋而用則無所不至也萬物恃之而生而不辭功成不名有衣養萬物而不為主常無欲可名於小萬物皆由道而生既生而不知其所由故天下常無欲之時萬物各得所若道無施於物故名於小矣萬物歸焉而不為主可名為大萬物皆歸之以生而力使不知其所由此不為小故復可名於大矣以其終不自為大故能成其大為大於其細圖難於其易執大象天下往大象天象之母也不寒不溫不涼故能包統萬物無所犯傷主若執之則天下往也往而不害安平大無形無識不遍不彰故萬物得往而不害妨也樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不足既言道之深大人聞道之言乃更不如樂與餌應時感悅人心也樂與餌則能令過客止而道之出言淡然無味視之不足見則不足以悅其目聽之不足聞則不足以娛其耳若無所中然乃用之不可窮極也將欲歙之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之是謂微明將欲除強梁去暴亂當以此四者因物之性令其自戮不假刑為大以除將物也故曰微明也足其張令之足而又求其張則衆所歙也與其張之不足而改其求張者愈益而己反危柔弱勝剛強魚不可脫於淵國之利器不可以示人利器利國之器也唯因物之性不假形以理物器不可覩而物各得其所則國之利器也示人者任刑也刑以利國則失矣魚脫於淵則必見失矣利國器而立刑以示人亦必失也道常無為順自然也而無不為萬物無不由為以治以成之也侯王若能守之萬物將自化化而欲作吾將鎮之以無名之朴化而欲作作欲成也吾將鎮之無名之朴不為主也無名之朴夫亦將無欲無欲競也不欲以靜天下將自定道德真經注卷之二
